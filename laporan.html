<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Jurnal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f8f9fa; padding: 20px; }
        .table-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .img-report { width: 120px; height: auto; border-radius: 5px; border: 1px solid #ddd; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="table-container">
        <h3 class="text-center mb-4">Laporan Jurnal Harian</h3>
        
        <div class="d-flex gap-2 mb-4 no-print justify-content-center">
            <button onclick="exportExcel()" class="btn btn-success fw-bold">Excel</button>
            <button onclick="exportPDF()" class="btn btn-danger fw-bold">PDF</button>
            <button onclick="loadData()" class="btn btn-outline-primary">Refresh</button>
            <a href="index.html" class="btn btn-secondary">Kembali</a>
        </div>

        <div id="areaLaporan">
            <table class="table table-bordered align-middle" id="tabelData">
                <thead class="table-dark text-center">
                    <tr>
                        <th width="50">No</th>
                        <th width="120">Tanggal</th>
                        <th>Kegiatan</th>
                        <th width="150">Dokumen</th>
                        <th width="80">Link</th>
                    </tr>
                </thead>
                <tbody id="isiTabel">
                    <tr><td colspan="5" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbUW5ce80CjkMrk3X8xSCcfXfGI1p-6s4_aBUJkz-cSVLQ2FyCkJxZvzCfYF4yBY24/exec';

    async function loadData() {
        try {
            const response = await fetch(scriptURL + '?action=read');
            const data = await response.json();
            let html = "";
            
            data.forEach((row, index) => {
                let tgl = row[0] ? new Date(row[0]).toLocaleDateString('id-ID') : '-';
                html += `<tr>
                    <td class="text-center">${index + 1}</td>
                    <td class="text-center">${tgl}</td>
                    <td>${row[1]}</td>
                    <td class="text-center">
                        <img src="${row[2]}" class="img-report" crossorigin="anonymous">
                    </td>
                    <td class="text-center"><a href="${row[2]}" target="_blank" class="btn btn-sm btn-link">Lihat</a></td>
                </tr>`;
            });
            document.getElementById('isiTabel').innerHTML = html;
        } catch (err) {
            document.getElementById('isiTabel').innerHTML = "<tr><td colspan='5'>Gagal memuat data.</td></tr>";
        }
    }

    loadData();

    function exportExcel() {
        const table = document.getElementById("tabelData");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Laporan_PakCokro.xlsx");
    }

    function exportPDF() {
        const element = document.getElementById('areaLaporan');
        const opt = {
            margin: 0.3,
            filename: 'Laporan_PakCokro.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true }, // useCORS penting agar gambar muncul di PDF
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
