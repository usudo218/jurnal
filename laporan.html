<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Jurnal Pak Cokro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f8f9fa; padding: 20px; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .img-preview { width: 80px; height: auto; border-radius: 5px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="table-container">
        <h2 class="text-center mb-4">Laporan Jurnal Harian</h2>
        
        <div class="d-flex gap-2 mb-3 no-print">
            <button onclick="exportExcel()" class="btn btn-success">Simpan ke Excel</button>
            <button onclick="exportPDF()" class="btn btn-danger">Simpan ke PDF</button>
            <button onclick="window.location.reload()" class="btn btn-secondary">Refresh Data</button>
        </div>

        <div id="areaLaporan">
            <table class="table table-bordered align-middle" id="tabelJurnal">
                <thead class="table-dark text-center">
                    <tr>
                        <th>No</th>
                        <th>Tanggal</th>
                        <th>Kegiatan</th>
                        <th>Dokumen</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody id="isiTabel">
                    <tr><td colspan="5" class="text-center">Sedang mengambil data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'PASTE_URL_WEB_APP_APPS_SCRIPT_ANDA_DI_SINI';

    window.onload = function() {
        fetch(scriptURL + '?action=read') // Kita asumsikan menggunakan mode GET sederhana
        // Jika menggunakan google.script.run (hanya jika dijalankan di dalam Apps Script)
        // Namun karena ini di GitHub, kita akan memanggil fungsi ambilDataLaporan via fetch
        muatData();
    };

    async function muatData() {
        // Untuk kemudahan di GitHub, kita gunakan google.script.run jika file ini diupload ke Apps Script
        // Jika di GitHub, Apps Script harus diatur untuk mengembalikan JSON.
        // Sebagai alternatif tercepat, silakan masukkan file ini ke dalam Editor Apps Script (Sekali Deploy).
        
        google.script.run.withSuccessHandler(data => {
            let html = "";
            data.forEach((row, index) => {
                html += `<tr>
                    <td class="text-center">${index + 1}</td>
                    <td>${new Date(row[0]).toLocaleDateString('id-ID')}</td>
                    <td>${row[1]}</td>
                    <td class="text-center"><img src="${row[2]}" class="img-preview"></td>
                    <td><a href="${row[2]}" target="_blank">Lihat File</a></td>
                </tr>`;
            });
            document.getElementById('isiTabel').innerHTML = html;
        }).ambilDataLaporan();
    }

    function exportExcel() {
        const table = document.getElementById("tabelJurnal");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Laporan_Jurnal_PakCokro.xlsx");
    }

    function exportPDF() {
        const element = document.getElementById('areaLaporan');
        const opt = {
            margin: 0.5,
            filename: 'Laporan_Jurnal_PakCokro.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
