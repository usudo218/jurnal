<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Jurnal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f8f9fa; padding: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .img-table { width: 80px; height: auto; border-radius: 5px; cursor: pointer; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="card p-4">
        <h3 class="text-center mb-4">Laporan Jurnal Harian</h3>
        <div class="d-flex gap-2 mb-4 no-print">
            <button onclick="exportExcel()" class="btn btn-success">Excel</button>
            <button onclick="exportPDF()" class="btn btn-danger">PDF</button>
            <a href="index.html" class="btn btn-primary">Kembali</a>
        </div>
        <div id="printArea">
            <table class="table table-bordered align-middle" id="tableData">
                <thead class="table-dark text-center">
                    <tr>
                        <th>No</th>
                        <th>Tanggal</th>
                        <th>Kegiatan</th>
                        <th>Dokumen</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody id="contentBody">
                    <tr><td colspan="5" class="text-center">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbUW5ce80CjkMrk3X8xSCcfXfGI1p-6s4_aBUJkz-cSVLQ2FyCkJxZvzCfYF4yBY24/exec';

    async function loadData() {
        const res = await fetch(scriptURL + '?action=read');
        const data = await res.json();
        let html = "";
        data.forEach((row, i) => {
            html += `<tr>
                <td class="text-center">${i+1}</td>
                <td>${new Date(row[0]).toLocaleDateString('id-ID')}</td>
                <td>${row[1]}</td>
                <td class="text-center"><img src="${row[2]}" class="img-table" onclick="window.open('${row[2]}')"></td>
                <td class="small text-break"><a href="${row[2]}" target="_blank">Lihat Original</a></td>
            </tr>`;
        });
        document.getElementById('contentBody').innerHTML = html;
    }
    loadData();

    function exportExcel() { XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("tableData")), "Jurnal_PakCokro.xlsx"); }
    function exportPDF() { html2pdf().from(document.getElementById('printArea')).set({margin: 0.5, filename:'Jurnal_PakCokro.pdf', jsPDF:{orientation:'landscape'}}).save(); }
</script>
</body>
</html>
