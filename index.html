<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatika | Jurnal & Presensi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; display: flex; flex-direction: column; min-height: 100vh; }
        .hidden { display: none !important; }
        footer { margin-top: auto; background: #212529; color: white; padding: 20px 0; }
        .nav-link.active { font-weight: bold; border-bottom: 2px solid white; }
    </style>
</head>
<body>

<!-- HEADER UNIVERSAL -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-cpu me-2"></i>INFORMATIKA</a>
        <div id="navMenu" class="navbar-nav ms-auto hidden">
            <a class="nav-link active" href="index.html">Jurnal</a>
            <a class="nav-link" href="nilai.html">Nilai</a>
            <a class="nav-link" href="rekap.html">Rekap</a>
            <button class="btn btn-light btn-sm ms-lg-3" onclick="handleLogout()">Logout</button>
        </div>
    </div>
</nav>

<!-- LOGIN SECTION -->
<div id="loginPage" class="container mt-5">
    <div class="card p-4 mx-auto shadow-sm" style="max-width: 400px; border-radius: 15px;">
        <h4 class="text-center fw-bold mb-4">LOGIN SISTEM</h4>
        <input type="password" id="passInput" class="form-control mb-3" placeholder="Masukkan Password">
        <button onclick="handleLogin()" id="btnLogin" class="btn btn-primary w-100 fw-bold">MASUK</button>
    </div>
</div>

<!-- CONTENT SECTION: JURNAL -->
<div id="mainContent" class="container hidden">
    <div class="card p-4 shadow-sm">
        <h5 class="fw-bold mb-4 border-bottom pb-2">Input Jurnal Harian</h5>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label small fw-bold">KELAS</label>
                <select id="pilihKelas" class="form-select" onchange="loadSiswa()">
                    <option value="">-- Pilih Kelas --</option>
                    <option value="10-1">10-1</option><option value="10-2">10-2</option>
                    <option value="10-3">10-3</option><option value="10-4">10-4</option>
                    <option value="10-5">10-5</option><option value="10-6">10-6</option>
                    <option value="10-7">10-7</option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label small fw-bold">TANGGAL</label><input type="date" id="tglInput" class="form-control"></div>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-6"><label class="form-label small fw-bold">KEGIATAN</label><input type="text" id="kegiatanInput" class="form-control" placeholder="Contoh: KBM Tatap Muka"></div>
            <div class="col-md-6"><label class="form-label small fw-bold">MATERI</label><input type="text" id="materiInput" class="form-control" placeholder="Materi Informatika"></div>
        </div>
        <div id="siswaContainer" class="table-responsive"></div>
    </div>
</div>

<!-- FOOTER UNIVERSAL -->
<footer>
    <div class="container text-center">
        <small>&copy; 2026 Sistem Jurnal Informatika | All Rights Reserved</small>
    </div>
</footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqyrP8NybpCRqrF1szhhzRNv-r0VBLixspSrxihVwaj9Mrbv3m5Y8xHskx8ZXgQHqE/exec"; // GANTI DENGAN URL EXEC ANDA

    document.addEventListener('DOMContentLoaded', () => {
        if(localStorage.getItem('informatika_login') === 'true') {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('navMenu').classList.remove('hidden');
            document.getElementById('tglInput').value = new Date().toISOString().split('T')[0];
        }
    });

    function handleLogin() {
        const pass = document.getElementById('passInput').value;
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", password: pass }) })
        .then(res => res.json()).then(res => {
            if(res.status === "success") {
                localStorage.setItem('informatika_login', 'true');
                location.reload();
            } else { alert("Password Salah!"); }
        });
    }

    function handleLogout() {
        localStorage.removeItem('informatika_login');
        location.href = "index.html";
    }

    function loadSiswa() {
        const kelas = document.getElementById('pilihKelas').value;
        const container = document.getElementById('siswaContainer');
        if(!kelas) return;
        container.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-primary"></div></div>';
        
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getSiswa", kelas: "KELAS " + kelas }) })[cite: 1]
        .then(res => res.json()).then(res => {
            let html = `<table class="table table-hover mt-3"><thead><tr><th>No</th><th>Nama</th><th width="100">Presensi</th></tr></thead><tbody>`;
            res.data.forEach((n, i) => {
                html += `<tr><td>${i+1}</td><td>${n}</td><td><select class="form-select form-select-sm sel-absen">
                    <option value="H">H</option><option value="S">S</option><option value="I">I</option><option value="A">A</option>
                </select></td></tr>`;
            });
            html += `</tbody></table><button onclick="simpanJurnal()" id="btnSimpan" class="btn btn-success w-100 py-3 fw-bold">SIMPAN JURNAL</button>`;
            container.innerHTML = html;
        });
    }

    function simpanJurnal() {
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true; btn.innerHTML = 'Menyimpan...';
        const abs = document.querySelectorAll('.sel-absen');
        let rek = {H:0, S:0, I:0, A:0};
        abs.forEach(el => rek[el.value]++);
        const data = {
            action: "simpanJurnal",
            tanggal: document.getElementById('tglInput').value,
            kelas: "KELAS " + document.getElementById('pilihKelas').value,[cite: 1]
            kegiatan: document.getElementById('kegiatanInput').value,
            materi: document.getElementById('materiInput').value,
            rekapPresensi: `H:${rek.H}, S:${rek.S}, I:${rek.I}, A:${rek.A}`
        };
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) })
        .then(res => res.json()).then(res => {
            if(res.status === "success") { alert("Tersimpan!"); location.reload(); }
        });
    }
</script>
</body>
</html>
