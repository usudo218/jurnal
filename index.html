<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFORMATIKA | Jurnal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; }
        .hidden { display: none !important; }
        footer { margin-top: auto; background: #212529; color: white; padding: 20px 0; }
        .navbar-brand { font-weight: 800; letter-spacing: 1px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html"><i class="bi bi-cpu-fill me-2"></i>INFORMATIKA</a>
        <div id="navMenu" class="navbar-nav ms-auto hidden">
            <a class="nav-link active" href="index.html">Jurnal</a>
            <a class="nav-link" href="nilai.html">Nilai</a>
            <a class="nav-link" href="rekap.html">Rekap</a>
            <button class="btn btn-light btn-sm ms-lg-3 fw-bold" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<!-- BOX LOGIN -->
<div id="loginArea" class="container mt-5">
    <div class="card p-4 mx-auto shadow" style="max-width: 400px; border-radius: 15px;">
        <h4 class="text-center fw-bold mb-4">LOGIN SISTEM</h4>
        <input type="password" id="passInput" class="form-control mb-3" placeholder="Password">
        <button onclick="login()" id="btnLogin" class="btn btn-primary w-100 fw-bold">MASUK</button>
    </div>
</div>

<!-- FORM JURNAL -->
<div id="jurnalArea" class="container hidden">
    <div class="card p-4 shadow-sm">
        <h5 class="fw-bold mb-4 border-bottom pb-2">Input Jurnal Harian</h5>
        <div class="row g-3 mb-3">
            <div class="col-md-6">
                <label class="form-label small fw-bold">PILIH KELAS</label>
                <select id="pilihKelas" class="form-select" onchange="ambilSiswa()">
                    <option value="">-- Pilih --</option>
                    <option value="10-1">10-1</option><option value="10-2">10-2</option>
                    <option value="10-3">10-3</option><option value="10-4">10-4</option>
                    <option value="10-5">10-5</option><option value="10-6">10-6</option>
                    <option value="10-7">10-7</option>
                </select>
            </div>
            <div class="col-md-6"><label class="form-label small fw-bold">TANGGAL</label><input type="date" id="tglInput" class="form-control"></div>
        </div>
        <div class="row g-3 mb-4">
            <div class="col-md-6"><label class="form-label small fw-bold">KEGIATAN</label><input type="text" id="kegInput" class="form-control" placeholder="Contoh: Praktek"></div>
            <div class="col-md-6"><label class="form-label small fw-bold">MATERI</label><input type="text" id="matInput" class="form-control" placeholder="Materi"></div>
        </div>
        <div id="containerSiswa" class="table-responsive"></div>
    </div>
</div>

<footer class="text-center"><small>&copy; 2026 Informatika | Presensi & Jurnal</small></footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0kgqLUjp765MW3XTxnsK3tphcnSNNzzu5LqPeLkbtMZ9GLa9301zh1kcaadCGe0JB/exec"; // GANTI DENGAN URL /exec ANDA

    document.addEventListener('DOMContentLoaded', () => {
        if(localStorage.getItem('isAuth') === 'true') {
            document.getElementById('loginArea').classList.add('hidden');
            document.getElementById('jurnalArea').classList.remove('hidden');
            document.getElementById('navMenu').classList.remove('hidden');
            document.getElementById('tglInput').value = new Date().toISOString().split('T')[0];
        }
    });

    function login() {
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('btnLogin');
        btn.disabled = true; btn.innerHTML = "Proses...";

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "login", password: pass }) })
        .then(res => res.json()).then(res => {
            if(res.status === "success") {
                localStorage.setItem('isAuth', 'true');
                location.reload();
            } else { alert("Salah!"); btn.disabled = false; btn.innerHTML = "MASUK"; }
        }).catch(() => { alert("Error Koneksi!"); btn.disabled = false; });
    }

    function logout() { localStorage.removeItem('isAuth'); location.reload(); }

    function ambilSiswa() {
        const kelas = document.getElementById('pilihKelas').value;
        const cont = document.getElementById('containerSiswa');
        if(!kelas) return;
        cont.innerHTML = "Memuat data...";
        
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getSiswa", kelas: "KELAS " + kelas }) })
        .then(res => res.json()).then(res => {
            let h = `<table class="table mt-3"><thead><tr><th>No</th><th>Nama</th><th width="100">Absen</th></tr></thead><tbody>`;
            res.data.forEach((n, i) => {
                h += `<tr><td>${i+1}</td><td>${n}</td><td><select class="form-select form-select-sm sel-absen">
                    <option value="H">H</option><option value="S">S</option><option value="I">I</option><option value="A">A</option>
                </select></td></tr>`;
            });
            h += `</tbody></table><button onclick="simpan()" id="btnSimpan" class="btn btn-success w-100 py-3 fw-bold">SIMPAN JURNAL</button>`;
            cont.innerHTML = h;
        });
    }

    function simpan() {
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true; btn.innerHTML = "Menyimpan...";
        const abs = document.querySelectorAll('.sel-absen');
        let rek = {H:0, S:0, I:0, A:0};
        abs.forEach(el => rek[el.value]++);
        
        const d = {
            action: "simpanJurnal",
            tanggal: document.getElementById('tglInput').value,
            kelas: "KELAS " + document.getElementById('pilihKelas').value,
            kegiatan: document.getElementById('kegInput').value,
            materi: document.getElementById('matInput').value,
            rekapPresensi: `H:${rek.H}, S:${rek.S}, I:${rek.I}, A:${rek.A}`
        };

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(d) })
        .then(res => res.json()).then(res => {
            if(res.status === "success") { alert("Berhasil!"); location.reload(); }
        });
    }
</script>
</body>
</html>
