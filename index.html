<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Jurnal Pak Agus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; padding: 30px 15px; }
        .card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: #0d6efd; color: white; text-align: center; padding: 25px; border: none; }
        .btn-primary { background: #0d6efd; border: none; padding: 12px; border-radius: 10px; font-weight: 600; }
        .btn-outline-secondary { border-radius: 10px; padding: 10px; font-weight: 500; }
        #preview { width: 100%; border-radius: 15px; display: none; margin-top: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container" style="max-width: 500px;">
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Jurnal Harian AGUS SUYATNO, S.Kom</h4>
            <small>Sistem Informasi Kegiatan Digital</small>
        </div>
        <div class="card-body p-4">
            <form id="formJurnal">
                <div class="mb-3">
                    <label class="form-label fw-bold">📅 Tanggal</label>
                    <input type="date" class="form-control form-control-lg" id="tanggal" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">📝 Uraian Kegiatan</label>
                    <textarea class="form-control" id="uraian" rows="3" placeholder="Deskripsikan kegiatan..." required></textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">📸 Bukti Foto</label>
                    <input type="file" class="form-control" id="foto" accept="image/*" capture="camera" onchange="previewImg(this)" required>
                    <img id="preview">
                </div>
                <button type="submit" id="btnSimpan" class="btn btn-primary w-100 mb-3">🚀 Kirim Jurnal</button>
                <a href="laporan.html" class="btn btn-outline-secondary w-100 text-decoration-none text-center">📊 Lihat Laporan</a>
            </form>
            <div id="status" class="mt-3 text-center fw-bold"></div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxbUW5ce80CjkMrk3X8xSCcfXfGI1p-6s4_aBUJkz-cSVLQ2FyCkJxZvzCfYF4yBY24/exec';
    const form = document.getElementById('formJurnal');

    function previewImg(input) {
        const pre = document.getElementById('preview');
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => { pre.src = e.target.result; pre.style.display = 'block'; };
            reader.readAsDataURL(input.files[0]);
        }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        const status = document.getElementById('status');
        const file = document.getElementById('foto').files[0];
        
        btn.disabled = true;
        status.innerText = "⏳ Sedang memproses...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const payload = {
                    tanggal: document.getElementById('tanggal').value,
                    uraian: document.getElementById('uraian').value,
                    data: canvas.toDataURL('image/jpeg', 0.7).split(',')[1],
                    type: 'image/jpeg',
                    name: file.name
                };

                fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.text())
                .then(msg => {
                    status.className = "mt-3 text-center fw-bold text-success";
                    status.innerText = msg;
                    form.reset();
                    document.getElementById('preview').style.display = 'none';
                    btn.disabled = false;
                });
            };
        };
    });
</script>
</body>
</html>
