<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Pak Agus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light p-3">

<div class="container bg-white p-4 rounded shadow-sm" style="max-width: 500px;">
    <h3 class="text-center text-primary mb-4">Jurnal Harian</h3>
    <form id="formJurnal">
        <div class="mb-3">
            <label class="form-label fw-bold">Tanggal</label>
            <input type="date" class="form-control" id="tanggal" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Kegiatan</label>
            <textarea class="form-control" id="uraian" rows="3" required></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Ambil Foto</label>
            <input type="file" class="form-control" id="foto" accept="image/*" capture="camera" required>
        </div>
        <button type="submit" id="btnSimpan" class="btn btn-primary w-100">Kirim Jurnal</button>
    </form>
    <div id="status" class="mt-3 text-center fw-bold"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbztlzuW0aA40SIoIStSEaATZLy2sDCA3i8exJA2FxfxRfr-SPI_bVvcnQI5-X2nn4rH/exec';
    const form = document.getElementById('formJurnal');

    form.addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('btnSimpan');
        const status = document.getElementById('status');
        const file = document.getElementById('foto').files[0];
        
        btn.disabled = true;
        status.innerText = "Sedang Mengirim...";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function() {
            const base64Data = reader.result.split(',')[1];
            
            const payload = {
                tanggal: document.getElementById('tanggal').value,
                uraian: document.getElementById('uraian').value,
                data: base64Data,
                type: file.type,
                name: file.name
            };

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.text())
            .then(msg => {
                status.className = "mt-3 text-center fw-bold text-success";
                status.innerText = msg;
                form.reset();
                btn.disabled = false;
            })
            .catch(err => {
                status.className = "mt-3 text-center fw-bold text-danger";
                status.innerText = "Gagal mengirim!";
                btn.disabled = false;
            });
        };
    });
</script>
</body>
</html>
