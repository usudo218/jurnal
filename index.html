<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Jurnal Guru | Pak Cokro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
        .login-container { max-width: 400px; margin-top: 100px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .btn-primary { background-color: #2563eb; border: none; padding: 10px; }
        .nav-link { cursor: pointer; }
        .sidebar { background: #fff; min-height: 100vh; border-right: 1px solid #ddd; }
        .hidden { display: none !important; }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
    </style>
</head>
<body>

<!-- LOGIN SECTION -->
<div id="loginPage" class="container login-container">
    <div class="card p-4">
        <div class="text-center mb-4">
            <i class="bi bi-person-badge-fill text-primary" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-2">Login Guru</h4>
            <p class="text-muted small">Sistem Informasi Jurnal & Nilai</p>
        </div>
        <div class="mb-3">
            <label class="form-label">Password Akses</label>
            <input type="password" id="passInput" class="form-control form-control-lg" placeholder="Masukkan Password">
        </div>
        <button onclick="attemptLogin()" id="btnLogin" class="btn btn-primary w-100 fw-bold">
            MASUK <i class="bi bi-box-arrow-in-right ms-2"></i>
        </button>
    </div>
</div>

<!-- DASHBOARD SECTION (Hidden by default) -->
<div id="mainDashboard" class="hidden">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-journal-check me-2"></i>E-JURNAL</a>
            <button class="btn btn-sm btn-light" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Sidebar / Menu Utama -->
            <div class="col-md-3 mb-4">
                <div class="card p-3">
                    <h6 class="text-muted small fw-bold mb-3">MENU UTAMA</h6>
                    <div class="list-group list-group-flush">
                        <button onclick="showPage('jurnal')" class="list-group-item list-group-item-action border-0 py-3">
                            <i class="bi bi-pencil-square me-2 text-primary"></i> Pengisian Jurnal
                        </button>
                        <button onclick="showPage('nilai')" class="list-group-item list-group-item-action border-0 py-3">
                            <i class="bi bi-clipboard-data me-2 text-success"></i> Input Nilai Siswa
                        </button>
                        <button onclick="showPage('rekap')" class="list-group-item list-group-item-action border-0 py-3">
                            <i class="bi bi-file-earmark-spreadsheet me-2 text-warning"></i> Rekap & Legger
                        </button>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-md-9">
                <!-- Page: Jurnal -->
                <div id="page-jurnal" class="content-page card p-4">
                    <h5 class="fw-bold mb-4">Pengisian Jurnal & Presensi</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Pilih Kelas</label>
                            <select id="pilihKelas" class="form-select">
                                <option value="">-- Pilih Kelas --</option>
                                <option>10-1</option><option>10-2</option><option>10-3</option>
                                <option>10-4</option><option>10-5</option><option>10-6</option><option>10-7</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tanggal</label>
                            <input type="date" id="tglJurnal" class="form-control">
                        </div>
                    </div>
                    <hr>
                    <div id="daftarSiswaContainer" class="mt-3">
                        <p class="text-muted italic">Pilih kelas untuk menampilkan daftar siswa...</p>
                    </div>
                </div>

                <!-- Page: Nilai -->
                <div id="page-nilai" class="content-page card p-4 hidden text-center">
                    <i class="bi bi-tools mb-3 text-muted" style="font-size: 3rem;"></i>
                    <h5>Fitur Input Nilai</h5>
                    <p class="text-muted">Modul pengisian Harian, UH, STS, dan SAS sedang disiapkan.</p>
                </div>

                <!-- Page: Rekap -->
                <div id="page-rekap" class="content-page card p-4 hidden text-center">
                    <i class="bi bi-file-earmark-bar-graph mb-3 text-muted" style="font-size: 3rem;"></i>
                    <h5>Rekapitulasi Data</h5>
                    <p class="text-muted">Laporan legger dan jurnal akan muncul di sini.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "function doPost(e) {
  var requestData = JSON.parse(e.postData.contents);
  var action = requestData.action;
  
  // LOGIN LOGIC
  if (action === "login") {
    var passBenar = "COKRO2026"; // Ganti sesuai keinginan
    if (requestData.password === passBenar) {
      return kirimResponse({status: "success"});
    } else {
      return kirimResponse({status: "error"});
    }
  }

  // LOGIC AMBIL DATA SISWA
  if (action === "getSiswa") {
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName("Siswa");
    var data = sheet.getDataRange().getValues();
    // Filter berdasarkan kelas (asumsi kolom A adalah kelas)
    var filtered = data.filter(r => r[0] == requestData.kelas);
    return kirimResponse({status: "success", data: filtered});
  }
}

function kirimResponse(obj) {
  return ContentService.createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}";

    function attemptLogin() {
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('btnLogin');
        
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';
        btn.disabled = true;

        // Simulasi POST ke Apps Script
        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", password: pass })
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            } else {
                alert("Password Salah!");
                btn.innerHTML = 'MASUK <i class="bi bi-box-arrow-in-right ms-2"></i>';
                btn.disabled = false;
            }
        }).catch(err => {
            alert("Error Koneksi: Pastikan URL Apps Script Benar");
            btn.innerHTML = 'MASUK <i class="bi bi-box-arrow-in-right ms-2"></i>';
            btn.disabled = false;
        });
    }

    function showPage(pageId) {
        document.querySelectorAll('.content-page').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + pageId).classList.remove('hidden');
    }

    function logout() {
        location.reload();
    }
</script>

</body>
</html>
