<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Jurnal Guru | Pak Cokro</title>
    <!-- Bootstrap 5 & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .hidden { display: none !important; }
        .login-container { max-width: 400px; margin: 100px auto; }
        .btn-primary { background-color: #0d6efd; padding: 10px; fw-bold; }
        .navbar { background-color: #0d6efd !important; }
        .table-container { overflow-x: auto; }
    </style>
</head>
<body>

<!-- HALAMAN LOGIN -->
<div id="loginPage" class="container login-container">
    <div class="card p-4">
        <div class="text-center mb-4">
            <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-2">E-JURNAL LOGIN</h4>
            <p class="text-muted small">Masukkan password akses Pak Cokro</p>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Password</label>
            <input type="password" id="passInput" class="form-control form-control-lg" placeholder="••••••••">
        </div>
        <button onclick="handleLogin()" id="btnLogin" class="btn btn-primary w-100 fw-bold">MASUK SEKARANG</button>
    </div>
</div>

<!-- DASHBOARD UTAMA -->
<div id="mainDashboard" class="hidden">
    <nav class="navbar navbar-dark shadow mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold"><i class="bi bi-journal-text me-2"></i>E-JURNAL PAK COKRO</span>
            <button class="btn btn-light btn-sm fw-bold" onclick="location.reload()">LOGOUT</button>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Menu Samping -->
            <div class="col-md-3 mb-4">
                <div class="list-group shadow-sm">
                    <button class="list-group-item list-group-item-action active border-0 py-3"><i class="bi bi-pencil-fill me-2"></i>Isi Jurnal & Presensi</button>
                    <button class="list-group-item list-group-item-action border-0 py-3"><i class="bi bi-star-fill me-2 text-warning"></i>Input Nilai Siswa</button>
                    <button class="list-group-item list-group-item-action border-0 py-3"><i class="bi bi-file-earmark-spreadsheet-fill me-2 text-success"></i>Rekap & Legger</button>
                </div>
            </div>

            <!-- Konten Utama -->
            <div class="col-md-9">
                <div class="card p-4 mb-4">
                    <h5 class="fw-bold border-bottom pb-2 mb-4">Pengisian Jurnal Harian</h5>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">PILIH KELAS</label>
                            <select id="pilihKelas" class="form-select" onchange="loadSiswa()">
                                <option value="">-- Pilih Kelas --</option>
                                <option value="10-1">10-1</option>
                                <option value="10-2">10-2</option>
                                <option value="10-3">10-3</option>
                                <option value="10-4">10-4</option>
                                <option value="10-5">10-5</option>
                                <option value="10-6">10-6</option>
                                <option value="10-7">10-7</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">TANGGAL</label>
                            <input type="date" id="tglInput" class="form-control">
                        </div>
                    </div>

                    <div class="row g-3 mb-4 border-bottom pb-4">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">KEGIATAN</label>
                            <input type="text" id="kegiatanInput" class="form-control" placeholder="Contoh: KBM Tatap Muka">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">MATERI</label>
                            <input type="text" id="materiInput" class="form-control" placeholder="Contoh: Pemrograman HTML">
                        </div>
                    </div>

                    <!-- Tempat Tabel Siswa -->
                    <div id="siswaContainer"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // MASUKKAN URL WEB APP APPS SCRIPT ANDA DI SINI!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyx5PhBuMvgYvIp0QfNCZ0TI7Z0FpVp-dk1KyEa_8vQ18zR-C1-SaVLijykuFRggEmS/exec"; 

    // Set tanggal hari ini otomatis
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('tglInput').value = new Date().toISOString().split('T')[0];
    });

    function handleLogin() {
        const pass = document.getElementById('passInput').value;
        const btn = document.getElementById('btnLogin');

        if(!pass) return alert("Masukkan password!");

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Loading...';

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "login", password: pass })
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('mainDashboard').classList.remove('hidden');
            } else {
                alert("Password Salah! Hubungi Admin.");
                btn.disabled = false;
                btn.innerHTML = "MASUK SEKARANG";
            }
        })
        .catch(err => {
            alert("Gagal terhubung ke server. Pastikan URL Script benar.");
            btn.disabled = false;
            btn.innerHTML = "MASUK SEKARANG";
        });
    }

    function loadSiswa() {
        const kelas = document.getElementById('pilihKelas').value;
        const container = document.getElementById('siswaContainer');
        if(!kelas) { container.innerHTML = ''; return; }

        container.innerHTML = '<div class="text-center p-5"><div class="spinner-border text-primary"></div><p class="mt-2">Mengambil data siswa...</p></div>';

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ action: "getSiswa", kelas: "KELAS " + kelas })
        })
        .then(res => res.json())
        .then(res => {
            if(res.data && res.data.length > 0) {
                let html = `<div class="table-container">
                    <table class="table table-hover border">
                    <thead class="table-light">
                        <tr><th>No</th><th>Nama Siswa</th><th width="150">Presensi</th></tr>
                    </thead>
                    <tbody>`;
                
                res.data.forEach((nama, i) => {
                    html += `<tr>
                        <td>${i+1}</td>
                        <td class="nama-siswa">${nama}</td>
                        <td>
                            <select class="form-select form-select-sm sel-absen">
                                <option value="H">Hadir</option>
                                <option value="S">Sakit</option>
                                <option value="I">Izin</option>
                                <option value="A">Alpha</option>
                            </select>
                        </td>
                    </tr>`;
                });

                html += `</tbody></table></div>
                    <button onclick="simpanJurnal()" id="btnSimpan" class="btn btn-success w-100 py-3 fw-bold mt-2">SIMPAN JURNAL & PRESENSI</button>`;
                container.innerHTML = html;
            } else {
                container.innerHTML = '<div class="alert alert-danger">Data siswa tidak ditemukan di Spreadsheet!</div>';
            }
        });
    }

    function simpanJurnal() {
        const btn = document.getElementById('btnSimpan');
        btn.disabled = true;
        btn.innerHTML = 'Sedang Menyimpan ke Google Sheets...';

        const absensi = document.querySelectorAll('.sel-absen');
        let rekap = {H:0, S:0, I:0, A:0};
        absensi.forEach(el => rekap[el.value]++);

        const payload = {
            action: "simpanJurnal",
            tanggal: document.getElementById('tglInput').value,
            kelas: "KELAS " + document.getElementById('pilihKelas').value,
            kegiatan: document.getElementById('kegiatanInput').value,
            materi: document.getElementById('materiInput').value,
            rekapPresensi: `H:${rekap.H}, S:${rekap.S}, I:${rekap.I}, A:${rekap.A}`
        };

        fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                alert("Data Berhasil Disimpan ke Google Sheets!");
                location.reload();
            }
        })
        .catch(err => {
            alert("Gagal menyimpan data!");
            btn.disabled = false;
            btn.innerHTML = "SIMPAN JURNAL & PRESENSI";
        });
    }
</script>
</body>
</html>
