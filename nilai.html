<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFORMATIKA | Nilai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; }
        footer { margin-top: auto; background: #212529; color: white; padding: 15px 0; }
        .inp-n { width: 55px; text-align: center; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">INFORMATIKA</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Jurnal</a>
            <a class="nav-link active" href="nilai.html">Nilai</a>
            <a class="nav-link" href="rekap.html">Rekap</a>
            <button class="btn btn-light btn-sm ms-lg-3" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="fw-bold mb-4">Input Nilai</h5>
        <select id="pilihKelas" class="form-select w-50 mb-3" onchange="loadSiswa()">
            <option value="">-- Pilih Kelas --</option>
            <option value="10-1">10-1</option><option value="10-2">10-2</option>
            <option value="10-3">10-3</option><option value="10-4">10-4</option>
            <option value="10-5">10-5</option><option value="10-6">10-6</option>
            <option value="10-7">10-7</option>
        </select>
        <div id="contNilai" class="table-responsive"></div>
    </div>
</div>
<footer class="text-center"><small>&copy; 2026 Informatika</small></footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx0kgqLUjp765MW3XTxnsK3tphcnSNNzzu5LqPeLkbtMZ9GLa9301zh1kcaadCGe0JB/exec";
    if(localStorage.getItem('isAuth') !== 'true') location.href = "index.html";
    function logout() { localStorage.removeItem('isAuth'); location.href = "index.html"; }

    function loadSiswa() {
        const k = document.getElementById('pilihKelas').value;
        if(!k) return;
        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getSiswa", kelas: "KELAS " + k }) })
        .then(res => res.json()).then(res => {
            let h = `<table class="table table-sm table-bordered"><thead><tr><th>Nama</th><th>H1</th><th>H2</th><th>H3</th><th>H4</th><th>UH</th><th>STS</th><th>SAS</th></tr></thead><tbody>`;
            res.data.forEach(n => {
                h += `<tr><td class="nama-s">${n}</td>
                    <td><input type="number" class="inp-n"></td><td><input type="number" class="inp-n"></td>
                    <td><input type="number" class="inp-n"></td><td><input type="number" class="inp-n"></td>
                    <td><input type="number" class="inp-n"></td><td><input type="number" class="inp-n"></td>
                    <td><input type="number" class="inp-n"></td></tr>`;
            });
            h += `</tbody></table><button onclick="simpanNilai()" id="btnS" class="btn btn-warning w-100">SIMPAN NILAI</button>`;
            document.getElementById('contNilai').innerHTML = h;
        });
    }

    function simpanNilai() {
    const btn = document.getElementById('btnS'); // Sesuaikan ID tombol Anda
    const kelas = document.getElementById('pilihKelas').value;
    const rows = document.querySelectorAll('tbody tr');
    let payload = [];

    btn.disabled = true;
    btn.innerHTML = "Sedang Menyimpan...";

    rows.forEach(tr => {
        const inputs = tr.querySelectorAll('input');
        payload.push({
            nama: tr.querySelector('.nama-s').innerText, // Pastikan kolom nama punya class 'nama-s'
            kelas: "KELAS " + kelas,
            h1: inputs[0].value, h2: inputs[1].value, h3: inputs[2].value, h4: inputs[3].value,
            uh: inputs[4].value, sts: inputs[5].value, sas: inputs[6].value
        });
    });

    fetch(SCRIPT_URL, { 
        method: "POST", 
        body: JSON.stringify({ action: "simpanNilai", payload: payload }) 
    })
    .then(res => res.json())
    .then(res => {
        if(res.status === "success") {
            alert("Nilai Kelas " + kelas + " Berhasil Disimpan!");
            location.reload();
        }
    })
    .catch(err => {
        alert("Terjadi kesalahan koneksi ke server!");
        btn.disabled = false;
        btn.innerHTML = "SIMPAN NILAI";
    });
}

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "simpanNilai", payload: payload }) })
        .then(res => res.json()).then(res => {
            if(res.status === "success") { alert("Tersimpan!"); location.reload(); }
        });
    }
</script>
</body>
</html>
