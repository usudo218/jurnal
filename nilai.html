<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFORMATIKA | Nilai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; min-height: 100vh; display: flex; flex-direction: column; }
        footer { margin-top: auto; background: #212529; color: white; padding: 15px 0; }
        .inp-n { width: 60px; text-align: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">INFORMATIKA</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Jurnal</a>
            <a class="nav-link active" href="nilai.html">Nilai</a>
            <a class="nav-link" href="rekap.html">Rekap</a>
            <button class="btn btn-light btn-sm ms-lg-3" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="fw-bold mb-4">Input Nilai Siswa</h5>

        <select id="pilihKelas" class="form-select w-50 mb-3" onchange="loadSiswa()">
            <option value="">-- Pilih Kelas --</option>
            <option value="10-1">10-1</option>
            <option value="10-2">10-2</option>
            <option value="10-3">10-3</option>
            <option value="10-4">10-4</option>
            <option value="10-5">10-5</option>
            <option value="10-6">10-6</option>
            <option value="10-7">10-7</option>
        </select>

        <div id="contNilai" class="table-responsive"></div>
    </div>
</div>

<footer class="text-center">
    <small>&copy; 2026 Informatika</small>
</footer>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhZM9iVVKIu0eywehfX3evZB3FNj__kS89NmrJFjy_w6aBjEGfTCsvPXQzuJIDKbRC/exec";

// 🔐 CEK LOGIN
if(localStorage.getItem('isAuth') !== 'true') location.href = "index.html";

function logout() {
    localStorage.removeItem('isAuth');
    location.href = "index.html";
}

// 📥 LOAD SISWA
function loadSiswa() {
    const kelas = document.getElementById('pilihKelas').value;
    const cont = document.getElementById('contNilai');

    if(!kelas) return;

    cont.innerHTML = "Memuat data siswa...";

    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "getSiswa",
            kelas: "KELAS " + kelas
        })
    })
    .then(res => res.json())
    .then(res => {
        if(res.status !== "success") {
            cont.innerHTML = "Gagal mengambil data";
            return;
        }

        let html = `
        <table class="table table-bordered table-sm">
            <thead class="table-light">
                <tr>
                    <th>Nama</th>
                    <th>H1</th>
                    <th>H2</th>
                    <th>H3</th>
                    <th>H4</th>
                    <th>UH</th>
                    <th>STS</th>
                    <th>SAS</th>
                </tr>
            </thead>
            <tbody>
        `;

        res.data.forEach(nama => {
            html += `
            <tr>
                <td class="nama-s">${nama}</td>
                <td><input type="number" class="form-control inp-n"></td>
                <td><input type="number" class="form-control inp-n"></td>
                <td><input type="number" class="form-control inp-n"></td>
                <td><input type="number" class="form-control inp-n"></td>
                <td><input type="number" class="form-control inp-n"></td>
                <td><input type="number" class="form-control inp-n"></td>
                <td><input type="number" class="form-control inp-n"></td>
            </tr>
            `;
        });

        html += `
            </tbody>
        </table>
        <button onclick="simpanNilai()" id="btnSimpan" class="btn btn-warning w-100 fw-bold">
            SIMPAN NILAI
        </button>
        `;

        cont.innerHTML = html;
    })
    .catch(() => {
        cont.innerHTML = "Terjadi kesalahan koneksi";
    });
}

// 💾 SIMPAN NILAI
function simpanNilai() {
    const btn = document.getElementById('btnSimpan');
    const kelas = document.getElementById('pilihKelas').value;
    const rows = document.querySelectorAll('tbody tr');

    let payload = [];

    btn.disabled = true;
    btn.innerHTML = "Menyimpan...";

    rows.forEach(tr => {
        const inputs = tr.querySelectorAll('input');

        payload.push({
            nama: tr.querySelector('.nama-s').innerText,
            kelas: "KELAS " + kelas,
            h1: inputs[0].value,
            h2: inputs[1].value,
            h3: inputs[2].value,
            h4: inputs[3].value,
            uh: inputs[4].value,
            sts: inputs[5].value,
            sas: inputs[6].value
        });
    });

    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "simpanNilai",
            payload: payload
        })
    })
    .then(res => res.json())
    .then(res => {
        if(res.status === "success") {
            alert("✅ Nilai berhasil disimpan!");
            location.reload();
        } else {
            alert("❌ Gagal menyimpan");
            btn.disabled = false;
            btn.innerHTML = "SIMPAN NILAI";
        }
    })
    .catch(() => {
        alert("❌ Error koneksi!");
        btn.disabled = false;
        btn.innerHTML = "SIMPAN NILAI";
    });
}
</script>

</body>
</html>
