<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatika | Input Nilai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f4f7f6; display: flex; flex-direction: column; min-height: 100vh; }
        footer { margin-top: auto; background: #212529; color: white; padding: 20px 0; }
        .nav-link.active { font-weight: bold; border-bottom: 2px solid white; }
        input[type=number] { width: 55px; text-align: center; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-cpu me-2"></i>INFORMATIKA</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Jurnal</a>
            <a class="nav-link active" href="nilai.html">Nilai</a>
            <a class="nav-link" href="rekap.html">Rekap</a>
            <button class="btn btn-light btn-sm ms-lg-3" onclick="handleLogout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="fw-bold mb-4 border-bottom pb-2">Input Nilai Siswa</h5>
        <div class="mb-4">
            <label class="form-label fw-bold">Pilih Kelas</label>
            <select id="pilihKelas" class="form-select w-50" onchange="loadSiswaNilai()">
                <option value="">-- Pilih Kelas --</option>
                <option value="10-1">10-1</option><option value="10-2">10-2</option>
                <option value="10-3">10-3</option><option value="10-4">10-4</option>
                <option value="10-5">10-5</option><option value="10-6">10-6</option>
                <option value="10-7">10-7</option>
            </select>
        </div>
        <div id="containerNilai" class="table-responsive">
            <p class="text-muted">Pilih kelas untuk menginput nilai harian (H1-H4), UH, STS, dan SAS.</p>
        </div>
    </div>
    <a href="index.html" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left me-2"></i>Kembali</a>
</div>

<footer><div class="container text-center text-white small">&copy; 2026 Informatika</div></footer>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7ncO_JmRdkXLoJpA0PeYqUzVRJFAHCUCaU50QRfc3Foph0-hBLlRZgUFJJQr6HDFt/exec";
    if(localStorage.getItem('informatika_login') !== 'true') location.href = "index.html";

    function handleLogout() { localStorage.removeItem('informatika_login'); location.href = "index.html"; }

    function loadSiswaNilai() {
        const kelas = document.getElementById('pilihKelas').value;
        const container = document.getElementById('containerNilai');
        if(!kelas) return;
        container.innerHTML = 'Memuat...';

        fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getSiswa", kelas: "KELAS " + kelas }) })
        .then(res => res.json()).then(res => {
            let html = `<table class="table table-sm table-bordered align-middle">
                <thead class="table-dark text-center">
                    <tr><th>No</th><th>Nama</th><th>H1</th><th>H2</th><th>H3</th><th>H4</th><th>UH</th><th>STS</th><th>SAS</th></tr>
                </thead><tbody>`;
            res.data.forEach((n, i) => {
                html += `<tr><td class="text-center">${i+1}</td><td style="min-width:180px">${n}</td>
                    <td><input type="number" class="form-control form-control-sm"></td>
                    <td><input type="number" class="form-control form-control-sm"></td>
                    <td><input type="number" class="form-control form-control-sm"></td>
                    <td><input type="number" class="form-control form-control-sm"></td>
                    <td><input type="number" class="form-control form-control-sm bg-light"></td>
                    <td><input type="number" class="form-control form-control-sm bg-light"></td>
                    <td><input type="number" class="form-control form-control-sm bg-warning-subtle"></td></tr>`;
            });
            html += `</tbody></table><button class="btn btn-primary w-100">SIMPAN SEMUA NILAI</button>`;
            container.innerHTML = html;
        });
    }
</script>
</body>
</html>
