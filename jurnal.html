<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f0f2f5; padding-top: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .btn-submit { background: #007bff; border: none; padding: 12px; font-weight: bold; transition: 0.3s; }
    .btn-submit:hover { background: #0056b3; transform: translateY(-2px); }
    #imagePreview { max-width: 100%; height: auto; border-radius: 10px; margin-top: 15px; display: none; border: 2px solid #dee2e6; }
    .loading-spinner { display: none; }
  </style>
</head>
<body>

<div class="container mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <h3 class="text-center mb-4 text-primary">Jurnal Harian</h3>
        
        <form id="jurnalForm">
          <div class="mb-3">
            <label class="form-label fw-bold">Tanggal Kegiatan</label>
            <input type="date" class="form-control" id="tanggal" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Uraian Kegiatan</label>
            <textarea class="form-control" id="uraian" rows="4" placeholder="Apa yang Anda kerjakan hari ini?" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Bukti Foto / Dokumen</label>
            <input type="file" class="form-control" id="foto" accept="image/*" capture="camera" onchange="previewImage(event)" required>
            <img id="imagePreview" src="" alt="Hasil Foto">
          </div>

          <button type="button" id="btnSimpan" class="btn btn-primary btn-submit w-100" onclick="startUpload()">
            <span id="btnText">Simpan ke Jurnal</span>
            <div id="loader" class="spinner-border spinner-border-sm loading-spinner" role="status"></div>
          </button>
        </form>

        <div id="status" class="mt-3 text-center fw-bold"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // Fungsi untuk menampilkan preview foto segera setelah difoto/dipilih
  function previewImage(event) {
    const reader = new FileReader();
    const preview = document.getElementById('imagePreview');
    
    reader.onload = function() {
      preview.src = reader.result;
      preview.style.display = 'block';
    }
    
    if (event.target.files[0]) {
      reader.readAsDataURL(event.target.files[0]);
    }
  }

  // Fungsi utama pengiriman data
  function startUpload() {
    const fileInput = document.getElementById('foto');
    const tanggal = document.getElementById('tanggal').value;
    const uraian = document.getElementById('uraian').value;
    const btn = document.getElementById('btnSimpan');
    const loader = document.getElementById('loader');
    const status = document.getElementById('status');

    if (!fileInput.files[0] || !tanggal || !uraian) {
      alert("Mohon lengkapi semua data!");
      return;
    }

    // Animasi Loading
    btn.disabled = true;
    loader.style.display = "inline-block";
    document.getElementById('btnText').innerText = "Sedang Mengirim...";

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
      const payload = {
        tanggal: tanggal,
        uraian: uraian,
        data: e.target.result.split(',')[1],
        type: file.type,
        name: file.name
      };

      google.script.run
        .withSuccessHandler((msg) => {
          status.innerHTML = msg;
          document.getElementById('jurnalForm').reset();
          document.getElementById('imagePreview').style.display = 'none';
          resetButton();
        })
        .withFailureHandler((err) => {
          status.innerHTML = "❌ Terjadi kesalahan: " + err;
          resetButton();
        })
        .uploadData(payload);
    };

    reader.readAsDataURL(file);
  }

  function resetButton() {
    const btn = document.getElementById('btnSimpan');
    const loader = document.getElementById('loader');
    btn.disabled = false;
    loader.style.display = "none";
    document.getElementById('btnText').innerText = "Simpan ke Jurnal";
  }
</script>

</body>
</html>
