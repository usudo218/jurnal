<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatika | Rekap & PDF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { background: #f4f7f6; display: flex; flex-direction: column; min-height: 100vh; }
        footer { margin-top: auto; background: #212529; color: white; padding: 20px 0; }
        .nav-link.active { font-weight: bold; border-bottom: 2px solid white; }
    </small></style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-cpu me-2"></i>INFORMATIKA</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Jurnal</a>
            <a class="nav-link" href="nilai.html">Nilai</a>
            <a class="nav-link active" href="rekap.html">Rekap</a>
            <button class="btn btn-light btn-sm ms-lg-3" onclick="handleLogout()">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card p-4 shadow-sm mb-4">
        <h5 class="fw-bold mb-4 border-bottom pb-2">Rekapitulasi Jurnal & Nilai</h5>
        <div class="row g-3">
            <div class="col-md-4">
                <button class="btn btn-outline-danger w-100 py-3 fw-bold" onclick="generatePDF()">
                    <i class="bi bi-file-earmark-pdf me-2"></i>UNDUH PDF JURNAL
                </button>
            </div>
            <div class="col-md-4">
                <button class="btn btn-outline-success w-100 py-3 fw-bold">
                    <i class="bi bi-file-earmark-excel me-2"></i>EKSPOR NILAI EXCEL
                </button>
            </div>
            <div class="col-md-4">
                <button class="btn btn-outline-primary w-100 py-3 fw-bold">
                    <i class="bi bi-calendar3 me-2"></i>PRESENSI BULANAN
                </button>
            </div>
        </div>
        <hr>
        <div id="previewRekap" class="p-3 bg-white border">
            <p class="text-center text-muted Italics">Preview data akan muncul di sini sebelum dicetak.</p>
        </div>
    </div>
    <a href="index.html" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left me-2"></i>Kembali</a>
</div>

<footer><div class="container text-center text-white small">&copy; 2026 Informatika</div></footer>

<script>
    if(localStorage.getItem('informatika_login') !== 'true') location.href = "index.html";
    function handleLogout() { localStorage.removeItem('informatika_login'); location.href = "index.html"; }

    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("REKAP JURNAL HARIAN INFORMATIKA", 14, 15);
        // Logika pengambilan data dari Apps Script dan dimasukkan ke autoTable
        alert("Fungsi PDF sedang memproses data dari Spreadsheet...");
    }
</script>
</body>
</html>
