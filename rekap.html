<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Rekap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand">REKAP DATA</span>
        <button class="btn btn-light btn-sm" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">
    <div class="card p-4">

        <h5 class="mb-3">Rekap Jurnal</h5>

        <button onclick="loadRekap()" class="btn btn-primary mb-3">
            Tampilkan Data
        </button>

        <button onclick="downloadExcel()" class="btn btn-success mb-3">
            Download Excel
        </button>

        <div id="tabel"></div>

    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhZM9iVVKIu0eywehfX3evZB3FNj__kS89NmrJFjy_w6aBjEGfTCsvPXQzuJIDKbRC/exec";

if(localStorage.getItem('isAuth') !== 'true') location.href = "index.html";

function logout(){
    localStorage.removeItem('isAuth');
    location.href = "index.html";
}

let dataGlobal = [];

function loadRekap() {
    fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getRekap" })
    })
    .then(res => res.json())
    .then(res => {
        dataGlobal = res.data;

        let html = "<table class='table table-bordered'><thead><tr>";

        res.data[0].forEach(h => html += `<th>${h}</th>`);
        html += "</tr></thead><tbody>";

        for(let i=1;i<res.data.length;i++){
            html += "<tr>";
            res.data[i].forEach(c => html += `<td>${c}</td>`);
            html += "</tr>";
        }

        html += "</tbody></table>";

        document.getElementById("tabel").innerHTML = html;
    });
}

function downloadExcel() {
    let csv = "";

    dataGlobal.forEach(row => {
        csv += row.join(",") + "\n";
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "rekap_jurnal.csv";
    a.click();
}
</script>

</body>
</html>
